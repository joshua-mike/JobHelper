# =============================================================================
# SOURCES  —  where jobs come from. Remote-only, all keyless.
#
# The remote aggregator feeds (Remotive, Arbeitnow, RemoteOK) need no config and
# give broad coverage immediately. The ATS feeds (Greenhouse/Lever/Ashby) pull
# from a CURATED company list — coverage there equals the list you maintain, so
# add the remote-first companies you actually want to work for.
# =============================================================================

# Keyless remote job-board aggregators. Toggle on/off.
aggregators:
  remotive: true       # https://remotive.com/api/remote-jobs
  arbeitnow: true      # https://www.arbeitnow.com/api/job-board-api
  remoteok: true       # https://remoteok.com/api

# Per-company ATS boards. The "token" is the slug in the public board URL.
#   Greenhouse: job-boards.greenhouse.io/<token>      -> token
#   Lever:      jobs.lever.co/<site>                  -> site
#   Ashby:      jobs.ashbyhq.com/<client>             -> client
# These are EXAMPLES — replace with real remote-first companies you want.
ats:
  # Curated & live-verified (2026-06) for a senior .NET/C# + full-stack, remote,
  # DoD-cleared candidate. Comments mark the strongest fits. Prune/extend freely.
  greenhouse:
    # —— Microsoft-stack / .NET employers ——
    - "perfectserve"               # .NET — "Senior SWE, .NET - US Remote"
    - "praxent"                    # .NET — US senior .NET (state-limited remote)
    - "janeasystems"               # .NET / Azure / SQL Server consultancy
    - "rackner"                    # .NET + DoD-cleared remote (clearance asset)
    - "isccareers"                 # Integrated Specialty Coverages — C#/.NET APIs
    - "lastpass"                   # .NET backend (security)
    - "iherb"                      # e-commerce catalog — .NET/C#+React+SQL Server, many remote
    # —— Defense / federal (your DoD clearance is an asset) ——
    - "air"                        # Govini — defense-acquisition analytics (board token is "air", not "govini")
    - "vannevarlabs"               # defense; some roles TS/SCI
    - "defenseunicorns"            # secure software delivery, remote
    - "striveworks"                # MLOps for defense
    - "defcon"                     # defense logistics; .NET-adjacent
    - "systemstechnologyresearch"  # STR — defense R&D
    - "primerai"                   # AI for intel/defense
    # —— Gov-tech / public-sector ——
    - "navapbc"                    # federal digital services
    - "skylighthq"                 # federal digital services
    - "oddball"                    # federal (Medicare) software
    - "mark43"                     # public-safety SaaS
    - "idme"                       # federal identity
    - "impiricus"                  # healthcare full-stack, remote-US
    - "slideinsurance"             # insurtech (verify remote per posting)
    # —— Large active remote-first boards (full-stack breadth) ——
    - "affirm"                     # fintech, many Remote-US SWE
    - "remotecom"                  # fully remote-first
    - "cortex"                     # remote backend
    - "openly"                     # insurtech remote-US backend
    # —— AI labs ——
    - "xai"                        # xAI (board token "xai"); mostly ONSITE (Palo Alto/
                                   #   Memphis) — see onsite_ok_companies in criteria.yaml
  lever:
    - "bhg-inc"                    # BHG Financial — Azure+C#+SQL+React (near-exact fit)
    - "Mediafly"                   # C# backend + React, 100% remote (CASE-SENSITIVE)
    - "agile-defense"              # .NET + DoD Secret, remote
    - "sprucesystems"              # govtech identity, all-remote
    - "shieldai"                   # defense-tech (large board)
    - "palantir"                   # defense/intel (large board)
    - "civitech"                   # civic-tech remote
    - "Flex"                       # fintech Remote-US backend (CASE-SENSITIVE)
    - "CollectlyInc"               # healthcare (Python-first; stretch) (CASE-SENSITIVE)
  ashby:
    - "delinea"                    # C#/.NET Core/MS SQL security (strong fit)
    - "meridianlink"               # C# + React fintech, remote-US
    - "opengov"                    # govtech, C#/.NET roles (moved here from Lever)
    - "second-front-systems"       # defense DevSecOps, cleared roles (moved from Lever)
    - "kin"                        # insurtech remote (Rails; stretch)
    - "curri"                      # logistics, remote-US senior SWE
    - "close"                      # CRM, remote-US (Python/React)
  # SmartRecruiters: public REST per company. Items are company slugs (the segment
  # in jobs.smartrecruiters.com/<slug>). Add the companies you want; SmartRecruiters
  # skews consumer/enterprise (lighter on defense), so curate to your targets.
  smartrecruiters:
    - "Visa"                       # payments/fintech (CASE-SENSITIVE slug) — starter; replace/extend
  # Microsoft careers (Eightfold "pcsx" API). NOTE: items here are SEARCH QUERIES,
  # not company slugs — the adapter pulls the top results per query, fetches each
  # job's full description, and tags remote/hybrid/onsite from the work-site field.
  # Remote-only filtering means few MS roles pass unless you add "Microsoft" to
  # onsite_ok_companies in criteria.yaml (US-scoped) to also see Redmond/onsite roles.
  microsoft:
    - "software engineer"
    - ".net"
    - "c#"
    - "backend engineer"
  # Workday powers a huge share of large employers. Each entry needs THREE slugs
  # from the careers URL https://{tenant}.{dc}.myworkdayjobs.com/{site}:
  #   tenant (1st label), dc (2nd label: wd1/wd5/...), site (path segment).
  # All below are live-verified (2026-06). The defense/federal primes are the
  # strongest fits for a cleared .NET engineer; remote-only filtering applies, so
  # add a company to onsite_ok_companies (criteria.yaml) to also see onsite roles.
  workday:
    - { tenant: "caci",        dc: "wd1", site: "External",                        company: "CACI" }
    - { tenant: "bah",         dc: "wd1", site: "BAH_Jobs",                        company: "Booz Allen Hamilton" }
    - { tenant: "ngc",         dc: "wd1", site: "Northrop_Grumman_External_Site",  company: "Northrop Grumman" }
    - { tenant: "leidos",      dc: "wd5", site: "External",                        company: "Leidos" }
    - { tenant: "nvidia",      dc: "wd5", site: "NVIDIAExternalCareerSite",        company: "NVIDIA" }
    - { tenant: "mastercard",  dc: "wd1", site: "CorporateCareers",               company: "Mastercard" }
  # Amazon careers (amazon.jobs). NOTE: items here are SEARCH QUERIES, not slugs.
  # Mostly office-based (Seattle/Bellevue/Arlington); remote-only filtering keeps
  # only "Virtual Location" roles unless you add "Amazon" to onsite_ok_companies.
  amazon:
    - "software development engineer"
    - ".net"
    - "c#"
  # Not recovered: Ad Hoc (moved to Workable), Granicus (Lever JSON API disabled),
  # Optimyl (uses Rippling) — none usable with the Greenhouse/Lever/Ashby adapters.

# Politeness: seconds to wait between HTTP requests to the same host.
request_delay_seconds: 1.0
# Hard cap on jobs ingested per source per run (safety valve).
per_source_cap: 400
# Microsoft only: top N results pulled per search query (keeps the crawl low-volume).
microsoft_per_query: 40
# Amazon only: top N results pulled per search query.
amazon_per_query: 40
# Workday only: search terms applied to EACH tenant, and the cap per term. Workday
# boards are large, so these scope the crawl to relevant roles (kept low-volume).
workday_searches:
  - "software engineer"
  - ".net"
  - "c#"
workday_per_search: 25
